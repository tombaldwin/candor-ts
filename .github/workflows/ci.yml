name: ci

# The product's own gate: behavioral tests + the §7.13 soundness fuzzer (teeth-verified locally;
# CI keeps it red-on-regression). Cross-engine conformance runs in candor-spec's CI, not here.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-fund --no-audit
      # `npm test` runs the whole battery: behavioral (test/mcp/watch) + the fabrication probe + the
      # §7.13 soundness fuzzer. Driving it through the script keeps CI in lockstep with `npm test` so a
      # gate added locally can't be silently missing here (the probe + mcp/watch suites used to be).
      - name: Full test battery (behavioral + probe + fuzzer)
        run: npm test
      - name: Effect-set oracle (the 20 shared cases)
        run: |
          git clone --depth 1 https://github.com/tombaldwin/candor-spec /tmp/spec
          node scan.mjs Cases.ts /tmp/out
          node check.mjs /tmp/out.json /tmp/spec/conformance/expected.json
