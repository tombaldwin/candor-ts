name: publish

# Trusted publishing to npm via GitHub Actions OIDC — no stored NPM_TOKEN. A `v*` tag (or a manual
# dispatch) publishes the current package.json version with signed provenance. The version is NOT
# bumped here: tag a commit whose package.json already carries the release version (the lockstep cut).
# One-time setup on npmjs.com: candor-ts → Settings → Trusted Publisher → GitHub Actions,
# repo `tombaldwin/candor-ts`, workflow `publish.yml`.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC — this is what authenticates the publish; no secret is stored
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.x.
      - run: npm install -g npm@latest
      - run: npm install --no-fund --no-audit
      # Gate: the same full battery as ci.yml — behavioral + fabrication probe + §7.13 fuzzer.
      # A broken build must not reach npm.
      - name: Full test battery (behavioral + probe + fuzzer)
        run: npm test
      # Idempotency guard: the release cycle sometimes publishes this version manually before the tag
      # lands (release-verify needs it live synchronously), so the tag-triggered run would otherwise
      # red-fail with "cannot publish over the previously published versions". Skip cleanly when the
      # version is already on npm — a duplicate is a no-op, not a failure. When THIS run wins the race it
      # still publishes with OIDC provenance (the preferred path).
      - name: Skip if this version is already on npm
        id: exists
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "candor-ts@$V" version >/dev/null 2>&1; then
            echo "candor-ts@$V is already published — nothing to do"
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm (provenance via OIDC)
        if: steps.exists.outputs.published == 'false'
        run: npm publish --provenance --access public
